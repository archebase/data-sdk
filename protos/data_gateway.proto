syntax = "proto3";

package archebase.data_gateway.v1;

import "common.proto";

service DataGatewayService {
  rpc CreateLogicalUpload(CreateLogicalUploadRequest)
      returns (CreateLogicalUploadResponse);
  rpc GetUploadRecovery(GetUploadRecoveryRequest)
      returns (GetUploadRecoveryResponse);
  rpc ReissueUploadCredentials(ReissueUploadCredentialsRequest)
      returns (ReissueUploadCredentialsResponse);
  rpc AbortUpload(AbortUploadRequest) returns (AbortUploadResponse);
  rpc CompleteUpload(CompleteUploadRequest)
      returns (CompleteUploadResponse);
}

// SDK-facing download authorization service exposed on the public gRPC port.
//
// This service uses user access JWT authentication and returns short-lived
// presigned read operations rather than cloud credentials.
service DataGatewayDownloadService {
  // Authorizes direct object downloads for the requested file IDs.
  rpc RequestDownload(RequestDownloadRequest)
      returns (RequestDownloadResponse);
}

// SDK-facing asynchronous object copy service exposed on the public gRPC port.
//
// This service accepts logical file IDs and persists copy jobs for background
// workers. It never exposes source OSS bucket, object key, or source-side
// credentials to the caller.
service DataGatewayCopyService {
  // Creates an asynchronous copy job for the requested file IDs.
  rpc CreateCopyJob(CreateCopyJobRequest) returns (CreateCopyJobResponse);
  // Returns the aggregate state of one copy job.
  rpc GetCopyJob(GetCopyJobRequest) returns (GetCopyJobResponse);
  // Lists item-level copy outcomes for one copy job.
  rpc ListCopyJobItems(ListCopyJobItemsRequest)
      returns (ListCopyJobItemsResponse);
  // Requests cancellation of one copy job.
  rpc CancelCopyJob(CancelCopyJobRequest) returns (CancelCopyJobResponse);
}

// SDK-facing device initialization service exposed on the dedicated init port.
//
// This surface intentionally does not require the upload API key because it is
// used to provision that key for a registered device. Deployment-level network
// controls and rate limiting are required before exposing it outside controlled
// environments.
service DeviceInitService {
  // Initializes one registered device and returns the upload API key.
  rpc InitDevice(InitDeviceRequest) returns (InitDeviceResponse);
  // Re-initializes one registered device and returns a rotated upload API key.
  rpc ReinitDevice(ReinitDeviceRequest) returns (InitDeviceResponse);
}

// Request sent by SDKs before they have an upload API key.
message InitDeviceRequest {
  // Bare platform-assigned device identifier provided by the operator.
  string device_id = 1;
  // SDK version reported for operator visibility and diagnostics.
  string sdk_version = 2;
  // SDK platform string, for example "ios".
  string platform = 3;
}

// Request sent by SDKs when explicitly rotating an existing upload API key.
message ReinitDeviceRequest {
  // Bare platform-assigned device identifier provided by the operator.
  string device_id = 1;
  // SDK version reported for operator visibility and diagnostics.
  string sdk_version = 2;
  // SDK platform string, for example "ios".
  string platform = 3;
}

// Response persisted by SDKs into archebase-config.json.
message InitDeviceResponse {
  // Base64-encoded credential returned by auth and used for later uploads.
  string api_key = 1;
  // Platform-approved device tags replayed on every subsequent upload.
  map<string, string> tags = 2;
}

// Internal-only storage service exposed by data-gateway.
// This service is served on a dedicated internal gRPC port and is not
// protected by the public JWT interceptor chain.
service InternalStorageService {
  // Generates presigned access for a single object.
  rpc PresignObject(PresignObjectRequest) returns (PresignObjectResponse);
}

message UploadCredentials {
  string bucket = 1;
  string endpoint = 2;
  string object_key = 3;
  string sts_access_key_id = 4;
  string sts_access_key_secret = 5;
  string sts_security_token = 6;
  int64 sts_expire_at_unix = 7;
  int64 part_size_bytes = 8;
}

enum UploadRecoveryAction {
  UPLOAD_RECOVERY_ACTION_UNSPECIFIED = 0;
  UPLOAD_RECOVERY_ACTION_CONTINUE = 1;
  UPLOAD_RECOVERY_ACTION_COMPLETE_ONLY = 2;
  UPLOAD_RECOVERY_ACTION_RESTART = 3;
  UPLOAD_RECOVERY_ACTION_ABORT = 4;
}

enum LogicalUploadStatus {
  LOGICAL_UPLOAD_STATUS_UNSPECIFIED = 0;
  LOGICAL_UPLOAD_STATUS_ACTIVE = 1;
  LOGICAL_UPLOAD_STATUS_COMPLETING = 2;
  LOGICAL_UPLOAD_STATUS_COMPLETED = 3;
  LOGICAL_UPLOAD_STATUS_TERMINAL = 4;
}

message CreateLogicalUploadRequest {
  map<string, string> client_hints = 1;
  string restart_from_upload_id = 2;
}

message CreateLogicalUploadResponse {
  string logical_upload_id = 1;
  string upload_id = 2;
  UploadCredentials credentials = 3;
}

message GetUploadRecoveryRequest {
  string logical_upload_id = 1;
}

message GetUploadRecoveryResponse {
  string logical_upload_id = 1;
  LogicalUploadStatus logical_upload_status = 2;
  string current_upload_id = 3;
  string bucket = 4;
  string endpoint = 5;
  string object_key = 6;
  bool can_refresh_credentials = 7;
  bool restart_allowed = 8;
  string terminal_reason = 9;
  int32 credential_refresh_count = 10;
  int64 session_expire_at_unix = 11;
  UploadRecoveryAction next_action = 12;
  int32 completed_part_count = 13;
  string oss_object_etag = 14;
}

message ReissueUploadCredentialsRequest {
  string upload_id = 1;
}

message ReissueUploadCredentialsResponse {
  string logical_upload_id = 1;
  string upload_id = 2;
  UploadCredentials credentials = 3;
}

message AbortUploadRequest {
  string logical_upload_id = 1;
  string reason = 2;
}

message AbortUploadResponse {
  string logical_upload_id = 1;
  string upload_id = 2;
}

message CompleteUploadRequest {
  string upload_id = 1;
  int64 file_size = 2;
  map<string, string> raw_tags = 3;
  int32 completed_part_count = 4;
  string oss_object_etag = 5;
}

message CompleteUploadResponse {}

// Requests presigned read operations for file IDs.
message RequestDownloadRequest {
  // Non-empty file IDs. Empty or duplicate IDs are rejected by data-gateway.
  repeated string file_ids = 1;
}

// Contains the presigned read operation for one requested file.
message DownloadObjectLocation {
  // File ID echoed from the request.
  string file_id = 1;
  // Presigned GET operation. Clients may add a Range header for ranged reads.
  PresignedOperation read = 2;
}

// Returns presigned read operations and client download hints.
message RequestDownloadResponse {
  // Files in the same order as request.file_ids.
  repeated DownloadObjectLocation files = 1;
  // Absolute expiration time shared by returned read operations, as Unix seconds.
  int64 expires_at_unix = 2;
  // Client hint for deciding when to use ranged parallel download.
  int64 large_file_threshold_bytes = 3;
  // Client hint for ranged GET part size.
  int64 range_part_size_bytes = 4;
}

// Requests creation of an asynchronous OSS server-side copy job.
message CreateCopyJobRequest {
  // Non-empty file IDs. Empty or duplicate IDs are rejected by data-gateway.
  repeated string file_ids = 1;
  // Destination bucket, endpoint, region, and object key template.
  CopyDestination destination = 2;
  // Optional caller-provided key used to make create retries idempotent.
  string idempotency_key = 3;
}

// Describes the user-owned destination for copied objects.
message CopyDestination {
  // Target OSS bucket name.
  string bucket = 1;
  // Target OSS endpoint used by copy workers.
  string endpoint = 2;
  // Target OSS region. Server-side copy only supports same-region buckets.
  string region = 3;
  // Object key template used to render the destination object key for each
  // copied file.
  //
  // Template syntax:
  // - Empty or whitespace-only values are normalized to "{file_id}".
  // - The only supported variable is "{file_id}".
  // - "{file_id}" is replaced by the source file ID from the request.
  // - All other text is treated as a literal prefix, suffix, or path segment.
  // - Date values are not expanded by data-gateway.
  // - Callers that want a date prefix must format it before sending the request.
  //
  // Examples:
  // - "{file_id}" renders "file-a" for file ID "file-a".
  // - "exports/{file_id}.bin" renders "exports/file-a.bin".
  // - "exports/20260503/{file_id}" appends yyyyMMdd as part of the prefix.
  // - For file ID "file-a", that template renders "exports/20260503/file-a".
  // - "20260503" is caller-provided literal text.
  //
  // Safety rules after rendering:
  // - The key must be non-empty and relative; it must not start with "/".
  // - The key must not contain a ".." path segment.
  // - The key must not contain control characters.
  // - The rendered UTF-8 byte length must fit the OSS object key limit.
  // - Within one CreateCopyJob request, every file ID must render to a unique key.
  // - A fixed template such as "latest.bin" is only valid when it cannot collide.
  string key_template = 4;
  // Optional target cloud account identifier for auditing and diagnostics.
  string account_id = 5;
  // Optional KMS key ID used when writing destination objects.
  string kms_key_id = 6;
}

// User-visible aggregate copy job state.
enum CopyJobStatus {
  COPY_JOB_STATUS_UNSPECIFIED = 0;
  COPY_JOB_STATUS_QUEUED = 1;
  COPY_JOB_STATUS_RUNNING = 2;
  COPY_JOB_STATUS_SUCCEEDED = 3;
  COPY_JOB_STATUS_PARTIAL_FAILED = 4;
  COPY_JOB_STATUS_FAILED = 5;
  COPY_JOB_STATUS_CANCELING = 6;
  COPY_JOB_STATUS_CANCELED = 7;
}

// User-visible per-file copy item state.
enum CopyItemStatus {
  COPY_ITEM_STATUS_UNSPECIFIED = 0;
  COPY_ITEM_STATUS_QUEUED = 1;
  COPY_ITEM_STATUS_COPYING = 2;
  COPY_ITEM_STATUS_SUCCEEDED = 3;
  COPY_ITEM_STATUS_FAILED_TERMINAL = 4;
  COPY_ITEM_STATUS_SKIPPED = 5;
  COPY_ITEM_STATUS_CANCELED = 6;
}

// Returns the identity and initial state of a newly created copy job.
message CreateCopyJobResponse {
  // Stable job identifier used by all subsequent copy RPCs.
  string copy_job_id = 1;
  // Initial or reused job status.
  CopyJobStatus status = 2;
  // Total number of file IDs accepted into the job.
  int32 total_items = 3;
  // Sum of known source file sizes, in bytes.
  int64 estimated_total_bytes = 4;
}

// Requests the aggregate state of one copy job.
message GetCopyJobRequest {
  // Stable copy job identifier returned by CreateCopyJob.
  string copy_job_id = 1;
}

// Returns the aggregate state of one copy job.
message GetCopyJobResponse {
  // Current job view.
  CopyJobView job = 1;
}

// User-visible aggregate state for one copy job.
message CopyJobView {
  // Stable copy job identifier.
  string copy_job_id = 1;
  // Current aggregate status.
  CopyJobStatus status = 2;
  // Destination selected at create time.
  CopyDestination destination = 3;
  // Total number of items in the job.
  int32 total_items = 4;
  // Number of items that finished successfully.
  int32 completed_items = 5;
  // Number of terminally failed items.
  int32 failed_items = 6;
  // Number of items skipped by overwrite policy.
  int32 skipped_items = 7;
  // Total source bytes planned for the job.
  int64 total_bytes = 8;
  // Bytes confirmed copied or skipped so far.
  int64 copied_bytes = 9;
  // Unix seconds when the job was created.
  int64 created_at_unix = 10;
  // Unix seconds when execution first started, or zero if not started.
  int64 started_at_unix = 11;
  // Unix seconds when the job reached a terminal state, or zero otherwise.
  int64 finished_at_unix = 12;
  // Terminal or job-level failure reason, if any.
  string terminal_reason = 13;
}

// Requests item-level copy state for one job.
message ListCopyJobItemsRequest {
  // Stable copy job identifier returned by CreateCopyJob.
  string copy_job_id = 1;
  // Optional status filter. Empty means all item statuses.
  repeated CopyItemStatus statuses = 2;
  // Maximum number of items to return.
  int32 page_size = 3;
  // Opaque token returned by a previous page.
  string page_token = 4;
}

// User-visible per-file state for one copy item.
message CopyJobItemView {
  // File ID requested by the user.
  string file_id = 1;
  // Destination object key rendered from the job key template.
  string destination_object_key = 2;
  // Current item status.
  CopyItemStatus status = 3;
  // Planned source object size, in bytes.
  int64 source_size = 4;
  // Bytes confirmed copied for this item.
  int64 copied_bytes = 5;
  // Stable machine-readable failure code, if any.
  string error_code = 6;
  // Redacted human-readable failure message, if any.
  string error_message = 7;
}

// Returns one page of copy job items.
message ListCopyJobItemsResponse {
  // Copy items in page order.
  repeated CopyJobItemView items = 1;
  // Opaque token for the next page, or empty when no more pages exist.
  string next_page_token = 2;
  // Total number of items matching the filter.
  int32 total_size = 3;
}

// Requests cancellation of one copy job.
message CancelCopyJobRequest {
  // Stable copy job identifier returned by CreateCopyJob.
  string copy_job_id = 1;
  // Optional operator or user reason recorded in job audit fields.
  string reason = 2;
}

// Returns the state after a cancel request is accepted.
message CancelCopyJobResponse {
  // Stable copy job identifier.
  string copy_job_id = 1;
  // Status after cancellation was requested.
  CopyJobStatus status = 2;
}

// Identifies an object within the configured OSS bucket.
message StorageObject {
  // Target bucket name.
  string bucket = 1;
  // Target object key.
  string object_key = 2;
}

// Declares the requested presigned access mode.
enum PresignAccessMode {
  PRESIGN_ACCESS_MODE_UNSPECIFIED = 0;
  PRESIGN_ACCESS_MODE_READ = 1;
  PRESIGN_ACCESS_MODE_WRITE = 2;
  PRESIGN_ACCESS_MODE_READ_WRITE = 3;
}

// Represents one presigned HTTP operation.
message PresignedOperation {
  // HTTP method that must be used by the caller.
  string method = 1;
  // Fully qualified presigned URI.
  string uri = 2;
  // Required request headers.
  map<string, string> headers = 3;
}

// Requests presigned access for a single object.
message PresignObjectRequest {
  // Object to presign.
  StorageObject object = 1;
  // Requested access mode.
  PresignAccessMode access_mode = 2;
  // Requested presign TTL in seconds.
  int64 expires_in_seconds = 3;
}

// Returns presigned operations for the requested object.
message PresignObjectResponse {
  // Object that was presigned.
  StorageObject object = 1;
  // Presigned read operation, present for read-enabled modes.
  PresignedOperation read = 2;
  // Presigned write operation, present for write-enabled modes.
  PresignedOperation write = 3;
  // Absolute expiration time as Unix seconds.
  int64 expires_at_unix = 4;
}

enum DataGatewayErrorCode {
  DATA_GATEWAY_ERROR_CODE_UNSPECIFIED = 0;
  DATA_GATEWAY_ERROR_CODE_UNAUTHENTICATED = 1;
  DATA_GATEWAY_ERROR_CODE_UPLOAD_NOT_FOUND = 2;
  DATA_GATEWAY_ERROR_CODE_UPLOAD_NOT_OWNED = 3;
  DATA_GATEWAY_ERROR_CODE_UPLOAD_NOT_REFRESHABLE = 4;
  DATA_GATEWAY_ERROR_CODE_INVALID_ARGUMENT = 5;
  DATA_GATEWAY_ERROR_CODE_FAILED_PRECONDITION = 6;
  DATA_GATEWAY_ERROR_CODE_STS_UNAVAILABLE = 7;
  DATA_GATEWAY_ERROR_CODE_INTERNAL_ERROR = 8;
}
